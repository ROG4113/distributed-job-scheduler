services:
  # database
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_DATABASE: job_scheduler_db
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # spring boot application
  app:
    build: .
    ports:
      - "8080-8081:8080"
    environment:
      # when using docker we use service name("db") instead of localhost for connection
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/job_scheduler_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy