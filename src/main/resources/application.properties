spring.application.name=distributed-job-scheduler

# Database connection settings
# when using docker, use the service name defined in docker-compose.yml instead of localhost(here "db")
spring.datasource.url=jdbc:mysql://localhost:3306/job_scheduler_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root

# REPLACE 'yourpassword' with your actual MySQL root password
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway settings
spring.flyway.enabled=true